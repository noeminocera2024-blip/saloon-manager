<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Salon · Appuntamenti</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #faf8f5; --ivory: #f3f0eb; --warm-white: #fff9f4;
      --taupe: #c4b8a8; --stone: #9a8f82; --charcoal: #2c2825;
      --espresso: #1a1512; --accent: #b08b6e; --accent-light: #d4b89a;
      --accent-dark: #8a6a50; --shadow: 0 2px 20px rgba(44,40,37,.08);
      --shadow-lg: 0 8px 40px rgba(44,40,37,.14);
      --radius: 12px; --radius-sm: 8px;
      --tiffany: #0abab5; --tiffany-dark: #088f8b;
      --lash-purple: #7c3aed; --lami-fuchsia: #d6006e;
    }
    body { font-family:'DM Sans',sans-serif; background:var(--cream); color:var(--charcoal); min-height:100vh; -webkit-font-smoothing:antialiased; }

    /* HEADER */
    .app-header { background:var(--tiffany); padding:0 2rem; }
    .header-content { max-width:1100px; margin:0 auto; padding:1.5rem 0; display:flex; align-items:center; }
    .logo { display:flex; align-items:center; gap:1rem; }
    .logo-icon { font-size:1.4rem; color:var(--accent-light); }
    .logo h1 { font-family:'Cormorant Garamond',serif; font-size:1.8rem; font-weight:400; color:var(--warm-white); letter-spacing:.08em; line-height:1; }
    .logo p { font-size:.7rem; color:var(--taupe); letter-spacing:.14em; text-transform:uppercase; margin-top:2px; }

    /* MAIN */
    .app-main { max-width:1100px; margin:0 auto; padding:2.5rem 1.5rem; }
    .layout { display:grid; grid-template-columns:380px 1fr; gap:2rem; align-items:start; }
    @media(max-width:760px){ .layout{ grid-template-columns:1fr; } }

    /* CALENDAR */
    .calendar { background:white; border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; border:1px solid var(--ivory); }
    .cal-header { display:flex; align-items:center; justify-content:space-between; padding:1.4rem 1.6rem; background:var(--tiffany); }
    .month-title { font-family:'Cormorant Garamond',serif; font-size:1.25rem; font-weight:400; color:var(--warm-white); text-transform:capitalize; letter-spacing:.04em; }
    .nav-btn { background:none; border:1px solid rgba(255,255,255,.15); color:var(--taupe); width:32px; height:32px; border-radius:50%; font-size:1.2rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; }
    .nav-btn:hover { background:rgba(255,255,255,.08); color:white; }
    .cal-weekdays { display:grid; grid-template-columns:repeat(7,1fr); background:var(--ivory); }
    .weekday { text-align:center; padding:.7rem 0; font-size:.65rem; font-weight:500; letter-spacing:.1em; text-transform:uppercase; color:var(--stone); }
    .cal-body { padding:.5rem; }
    .cal-row { display:grid; grid-template-columns:repeat(7,1fr); }
    .cal-day { aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; border-radius:var(--radius-sm); transition:background .15s; gap:3px; }
    .cal-day:hover { background:var(--ivory); }
    .day-num { font-size:.85rem; color:var(--charcoal); line-height:1; }
    .other-month .day-num { color:var(--taupe); }
    .is-today { background:var(--ivory); }
    .is-today .day-num { font-weight:500; color:var(--accent-dark); }
    .is-selected { background:var(--espresso) !important; }
    .is-selected .day-num { color:white; }
    .dot { width:4px; height:4px; border-radius:50%; background:var(--accent); }
    .is-selected .dot { background:var(--accent-light); }

    /* LIST */
    .appointment-list { background:white; border-radius:var(--radius); box-shadow:var(--shadow); border:1px solid var(--ivory); min-height:340px; display:flex; flex-direction:column; }
    .list-header { display:flex; align-items:center; justify-content:space-between; padding:1.4rem 1.6rem; border-bottom:1px solid var(--ivory); }
    .list-label { font-size:.65rem; letter-spacing:.12em; text-transform:uppercase; color:var(--stone); margin-bottom:2px; }
    .list-date { font-family:'Cormorant Garamond',serif; font-size:1.3rem; font-weight:400; color:var(--charcoal); text-transform:capitalize; }
    .btn-add { width:36px; height:36px; border-radius:50%; background:var(--tiffany); color:white; border:none; font-size:1.5rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .2s; line-height:1; flex-shrink:0; }
    .btn-add:hover { background:var(--tiffany-dark); }
    .list-empty { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.6rem; padding:3rem; color:var(--stone); font-size:.85rem; text-align:center; }
    .empty-icon { font-size:1.5rem; color:var(--taupe); margin-bottom:.4rem; }
    .btn-empty-add { margin-top:.5rem; background:none; border:1px solid var(--taupe); color:var(--stone); padding:.5rem 1.2rem; border-radius:20px; font-size:.8rem; cursor:pointer; transition:all .2s; font-family:'DM Sans',sans-serif; }
    .btn-empty-add:hover { border-color:var(--accent); color:var(--accent-dark); }
    .spinner { width:24px; height:24px; border:2px solid var(--ivory); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* CARDS */
    .appointments { list-style:none; padding:1rem; display:flex; flex-direction:column; gap:.6rem; }
    .appt-card { display:flex; align-items:flex-start; gap:1rem; padding:1rem 1.1rem; background:var(--cream); border-radius:var(--radius-sm); border:1px solid var(--ivory); transition:box-shadow .2s; }
    .appt-card:hover { box-shadow:var(--shadow); }
    .appt-time { font-family:'Cormorant Garamond',serif; font-size:1.1rem; color:var(--accent); min-width:44px; padding-top:1px; font-weight:500; }
    .appt-body { flex:1; min-width:0; }
    .appt-name { font-weight:500; font-size:.9rem; color:var(--charcoal); margin-bottom:2px; }
    .appt-name.lash { color:var(--lash-purple); }
    .appt-name.lami { color:var(--lami-fuchsia); }
    .appt-service { font-size:.82rem; color:var(--stone); line-height:1.4; }
    .appt-notes { font-size:.75rem; color:var(--taupe); margin-top:3px; font-style:italic; }
    .appt-actions { display:flex; gap:.3rem; flex-shrink:0; }
    .icon-btn { background:none; border:none; width:28px; height:28px; border-radius:6px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:.85rem; color:var(--stone); transition:all .15s; }
    .icon-btn:hover { background:var(--ivory); color:var(--charcoal); }
    .icon-btn.del:hover { background:#fdecea; color:#c0392b; }

    /* MODAL */
    .overlay { position:fixed; inset:0; background:rgba(26,21,18,.5); display:flex; align-items:center; justify-content:center; z-index:1000; padding:1rem; backdrop-filter:blur(4px); animation:fadeIn .2s ease; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .modal { background:white; border-radius:var(--radius); box-shadow:var(--shadow-lg); width:100%; max-width:460px; animation:slideUp .25s ease; }
    @keyframes slideUp { from{transform:translateY(12px);opacity:0} to{transform:translateY(0);opacity:1} }
    .modal-header { display:flex; align-items:flex-start; justify-content:space-between; padding:1.5rem 1.6rem 1.2rem; border-bottom:1px solid var(--ivory); }
    .modal-label { font-size:.65rem; letter-spacing:.12em; text-transform:uppercase; color:var(--stone); margin-bottom:3px; }
    .modal-date { font-family:'Cormorant Garamond',serif; font-size:1.3rem; font-weight:400; color:var(--charcoal); text-transform:capitalize; }
    .close-btn { background:none; border:none; cursor:pointer; font-size:.9rem; color:var(--stone); width:28px; height:28px; display:flex; align-items:center; justify-content:center; border-radius:6px; transition:all .15s; }
    .close-btn:hover { background:var(--ivory); color:var(--charcoal); }
    .modal-form { padding:1.4rem 1.6rem 1.6rem; display:flex; flex-direction:column; gap:1.1rem; }
    .form-row { display:flex; gap:.8rem; align-items:flex-start; }
    .form-group { display:flex; flex-direction:column; gap:.4rem; flex:1; }
    .form-group.small { flex:0 0 100px; }
    label { font-size:.7rem; font-weight:500; letter-spacing:.08em; text-transform:uppercase; color:var(--stone); }
    .opt { font-weight:400; text-transform:none; letter-spacing:0; font-size:.68rem; }
    input, textarea { font-family:'DM Sans',sans-serif; font-size:.875rem; padding:.65rem .9rem; border:1px solid var(--taupe); border-radius:var(--radius-sm); color:var(--charcoal); background:white; outline:none; transition:border-color .15s; width:100%; }
    input:focus, textarea:focus { border-color:var(--accent); }
    textarea { resize:vertical; min-height:80px; line-height:1.5; }
    .modal-actions { display:flex; gap:.7rem; justify-content:flex-end; padding-top:.3rem; }
    .btn-primary, .btn-secondary { font-family:'DM Sans',sans-serif; font-size:.85rem; font-weight:500; padding:.65rem 1.4rem; border-radius:8px; cursor:pointer; border:none; transition:all .2s; }
    .btn-primary { background:var(--tiffany); color:white; }
    .btn-primary:hover { background:var(--tiffany-dark); }
    .btn-secondary { background:var(--ivory); color:var(--stone); }
    .btn-secondary:hover { background:var(--taupe); color:white; }

    /* CONFIG BANNER */
    .config-banner { background:#fff3cd; border:1px solid #ffc107; border-radius:var(--radius); padding:1.5rem 2rem; margin-bottom:2rem; }
    .config-banner h3 { font-family:'Cormorant Garamond',serif; font-size:1.2rem; margin-bottom:.5rem; color:#856404; }
    .config-banner p { font-size:.85rem; color:#6c5700; line-height:1.6; }
    .config-banner code { background:rgba(0,0,0,.07); padding:.1rem .4rem; border-radius:4px; font-size:.8rem; }
  </style>
</head>
<body>

<div id="app"></div>

<script>
  // ══════════════════════════════════════════
  //  ⚙️  CONFIGURA QUI LE TUE CREDENZIALI
  // ══════════════════════════════════════════
  const SUPABASE_URL  = 'https://vwlcnahzmyumpfgfhjjn.supabase.co';
  const SUPABASE_KEY  = 'sb_publishable_2-tGU4JZg3KdzfHStvELfw_8E6FkpMD';
  // ══════════════════════════════════════════

  const { createClient } = supabase;
  const db = (SUPABASE_URL && SUPABASE_KEY && !SUPABASE_URL.includes('TUO'))
    ? createClient(SUPABASE_URL, SUPABASE_KEY)
    : null;

  // ── Helpers ──
  const MONTHS_IT = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
  const DAYS_IT   = ['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];
  const DAYS_FULL = ['lunedì','martedì','mercoledì','giovedì','venerdì','sabato','domenica'];

  function toDateStr(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  function formatDateFull(d) {
    const dow = DAYS_FULL[(d.getDay()+6)%7];
    return `${dow} ${d.getDate()} ${MONTHS_IT[d.getMonth()]}`;
  }

  // ── State ──
  let state = {
    currentMonth: new Date(),
    selectedDate: new Date(),
    appointments: [],
    loading: true,
    modal: null,   // null | 'new' | appointment-object
  };

  // ── Supabase ops ──
  async function fetchAppointments() {
    if (!db) { state.loading = false; render(); return; }
    state.loading = true; render();
    const { data } = await db.from('appointments').select('*').order('date').order('time');
    state.appointments = data || [];
    state.loading = false;
    render();
  }

  async function saveAppointment(form) {
    if (!db) return;
    if (typeof state.modal === 'object' && state.modal?.id) {
      await db.from('appointments').update(form).eq('id', state.modal.id);
    } else {
      await db.from('appointments').insert([{ ...form, date: toDateStr(state.selectedDate) }]);
    }
    state.modal = null;
    fetchAppointments();
  }

  async function deleteAppointment(id) {
    if (!db) return;
    await db.from('appointments').delete().eq('id', id);
    fetchAppointments();
  }

  // ── Render ──
  function render() {
    const root = document.getElementById('app');
    root.innerHTML = '';
    root.appendChild(buildApp());
  }

  function buildApp() {
    const wrap = el('div');

    // Header
    const header = el('header', {class:'app-header'});
    header.innerHTML = `<div class="header-content"><div class="logo"><span class="logo-icon">✦</span><div><h1>Salon</h1><p>Gestione Appuntamenti</p></div></div></div>`;
    wrap.appendChild(header);

    const main = el('main', {class:'app-main'});

    if (!db) {
      const banner = el('div', {class:'config-banner'});
      banner.innerHTML = `<h3>⚙️ Configurazione richiesta</h3><p>Apri il file <code>index.html</code>, trova le righe <code>SUPABASE_URL</code> e <code>SUPABASE_KEY</code> in cima allo script e inserisci le tue credenziali Supabase.</p>`;
      main.appendChild(banner);
    }

    const layout = el('div', {class:'layout'});
    layout.appendChild(buildCalendar());
    layout.appendChild(buildList());
    main.appendChild(layout);
    wrap.appendChild(main);

    if (state.modal !== null) wrap.appendChild(buildModal());

    return wrap;
  }

  // ── Calendar ──
  function buildCalendar() {
    const cm = state.currentMonth;
    const year = cm.getFullYear(), month = cm.getMonth();

    const firstDay = new Date(year, month, 1);
    const lastDay  = new Date(year, month+1, 0);
    let startDate  = new Date(firstDay);
    let dow = (firstDay.getDay()+6)%7;
    startDate.setDate(startDate.getDate() - dow);

    const apptDates = new Set(state.appointments.map(a => a.date));

    const cal = el('div', {class:'calendar'});

    // header
    const hdr = el('div', {class:'cal-header'});
    const prev = el('button', {class:'nav-btn'}, '‹');
    prev.onclick = () => { state.currentMonth = new Date(year, month-1, 1); render(); };
    const next = el('button', {class:'nav-btn'}, '›');
    next.onclick = () => { state.currentMonth = new Date(year, month+1, 1); render(); };
    const title = el('span', {class:'month-title'}, `${MONTHS_IT[month]} ${year}`);
    hdr.append(prev, title, next);
    cal.appendChild(hdr);

    // weekdays
    const wdays = el('div', {class:'cal-weekdays'});
    DAYS_IT.forEach(d => wdays.appendChild(el('div', {class:'weekday'}, d)));
    cal.appendChild(wdays);

    // body
    const body = el('div', {class:'cal-body'});
    let day = new Date(startDate);
    while (day <= lastDay || (day.getDay()+6)%7 !== 0) {
      const row = el('div', {class:'cal-row'});
      for (let i = 0; i < 7; i++) {
        const d = new Date(day);
        const ds = toDateStr(d);
        const classes = ['cal-day'];
        if (d.getMonth() !== month) classes.push('other-month');
        if (ds === toDateStr(new Date())) classes.push('is-today');
        if (ds === toDateStr(state.selectedDate)) classes.push('is-selected');

        const cell = el('div', {class: classes.join(' ')});
        cell.appendChild(el('span', {class:'day-num'}, String(d.getDate())));
        if (apptDates.has(ds)) cell.appendChild(el('span', {class:'dot'}));
        cell.onclick = () => { state.selectedDate = new Date(d); render(); };
        row.appendChild(cell);
        day.setDate(day.getDate() + 1);
      }
      body.appendChild(row);
      if (day > lastDay && (day.getDay()+6)%7 === 0) break;
    }
    cal.appendChild(body);
    return cal;
  }

  // ── List ──
  function buildList() {
    const ds = toDateStr(state.selectedDate);
    const dayAppts = state.appointments
      .filter(a => a.date === ds)
      .sort((a,b) => a.time.localeCompare(b.time));

    const panel = el('div', {class:'appointment-list'});

    const hdr = el('div', {class:'list-header'});
    const info = el('div');
    info.appendChild(el('p', {class:'list-label'}, 'Appuntamenti'));
    info.appendChild(el('h3', {class:'list-date'}, formatDateFull(state.selectedDate)));
    hdr.appendChild(info);
    const addBtn = el('button', {class:'btn-add'}, '+');
    addBtn.title = 'Nuovo appuntamento';
    addBtn.onclick = () => { state.modal = 'new'; render(); };
    hdr.appendChild(addBtn);
    panel.appendChild(hdr);

    if (state.loading) {
      const empty = el('div', {class:'list-empty'});
      empty.appendChild(el('div', {class:'spinner'}));
      panel.appendChild(empty);
    } else if (dayAppts.length === 0) {
      const empty = el('div', {class:'list-empty'});
      empty.appendChild(el('p', {class:'empty-icon'}, '✦'));
      empty.appendChild(el('p', {}, 'Nessun appuntamento'));
      const addEmpty = el('button', {class:'btn-empty-add'}, 'Aggiungi appuntamento');
      addEmpty.onclick = () => { state.modal = 'new'; render(); };
      empty.appendChild(addEmpty);
      panel.appendChild(empty);
    } else {
      const ul = el('ul', {class:'appointments'});
      dayAppts.forEach(appt => {
        const card = el('li', {class:'appt-card'});
        card.appendChild(el('div', {class:'appt-time'}, appt.time?.slice(0,5)));
        const body = el('div', {class:'appt-body'});
        const svcLower = appt.service ? appt.service.toLowerCase() : '';
        const isLash = svcLower.includes('lash');
        const isLami = svcLower.includes('lami');
        const nameClass = isLash ? 'appt-name lash' : isLami ? 'appt-name lami' : 'appt-name';
        body.appendChild(el('p', {class: nameClass}, appt.client_name));
        body.appendChild(el('p', {class:'appt-service'}, appt.service));
        if (appt.notes) body.appendChild(el('p', {class:'appt-notes'}, appt.notes));
        card.appendChild(body);
        const actions = el('div', {class:'appt-actions'});
        const editBtn = el('button', {class:'icon-btn'}, '✎');
        editBtn.title = 'Modifica';
        editBtn.onclick = () => { state.modal = appt; render(); };
        const delBtn = el('button', {class:'icon-btn del'}, '✕');
        delBtn.title = 'Elimina';
        delBtn.onclick = () => { if(confirm('Eliminare questo appuntamento?')) deleteAppointment(appt.id); };
        actions.append(editBtn, delBtn);
        card.appendChild(actions);
        ul.appendChild(card);
      });
      panel.appendChild(ul);
    }
    return panel;
  }

  // ── Modal ──
  function buildModal() {
    const isEdit = typeof state.modal === 'object' && state.modal?.id;
    const appt = isEdit ? state.modal : null;

    const overlay = el('div', {class:'overlay'});
    overlay.onclick = (e) => { if(e.target === overlay){ state.modal = null; render(); } };

    const modal = el('div', {class:'modal'});

    const hdr = el('div', {class:'modal-header'});
    const info = el('div');
    info.appendChild(el('p', {class:'modal-label'}, isEdit ? 'Modifica appuntamento' : 'Nuovo appuntamento'));
    info.appendChild(el('h3', {class:'modal-date'}, formatDateFull(state.selectedDate)));
    hdr.appendChild(info);
    const closeBtn = el('button', {class:'close-btn'}, '✕');
    closeBtn.onclick = () => { state.modal = null; render(); };
    hdr.appendChild(closeBtn);
    modal.appendChild(hdr);

    const form = el('div', {class:'modal-form'});

    // Row: nome + orario
    const row = el('div', {class:'form-row'});
    const gName = el('div', {class:'form-group'});
    gName.appendChild(el('label', {}, 'Cliente'));
    const iName = el('input', {type:'text', placeholder:'Nome cliente', id:'f-name'});
    iName.value = appt?.client_name || '';
    gName.appendChild(iName);
    row.appendChild(gName);

    const gTime = el('div', {class:'form-group small'});
    gTime.appendChild(el('label', {}, 'Orario'));
    const iTime = el('input', {type:'time', id:'f-time'});
    iTime.value = appt?.time?.slice(0,5) || '10:00';
    gTime.appendChild(iTime);
    row.appendChild(gTime);
    form.appendChild(row);

    // Servizio
    const gSvc = el('div', {class:'form-group'});
    gSvc.appendChild(el('label', {}, 'Servizio'));
    const tSvc = el('textarea', {placeholder:'Es: Taglio + colore, piega, trattamento…', id:'f-service', rows:'3'});
    tSvc.value = appt?.service || '';
    gSvc.appendChild(tSvc);
    form.appendChild(gSvc);

    // Note
    const gNotes = el('div', {class:'form-group'});
    const lNotes = el('label', {}, 'Note ');
    lNotes.appendChild(el('span', {class:'opt'}, '(opzionale)'));
    gNotes.appendChild(lNotes);
    const iNotes = el('input', {type:'text', placeholder:'Note aggiuntive', id:'f-notes'});
    iNotes.value = appt?.notes || '';
    gNotes.appendChild(iNotes);
    form.appendChild(gNotes);

    // Actions
    const actions = el('div', {class:'modal-actions'});
    const cancelBtn = el('button', {class:'btn-secondary'}, 'Annulla');
    cancelBtn.onclick = () => { state.modal = null; render(); };
    const saveBtn = el('button', {class:'btn-primary'}, isEdit ? 'Salva modifiche' : 'Aggiungi');
    saveBtn.onclick = () => {
      const name = document.getElementById('f-name').value.trim();
      const time = document.getElementById('f-time').value;
      const service = document.getElementById('f-service').value.trim();
      const notes = document.getElementById('f-notes').value.trim();
      if (!name || !service) { alert('Inserisci nome e servizio'); return; }
      saveAppointment({ client_name:name, time, service, notes });
    };
    actions.append(cancelBtn, saveBtn);
    form.appendChild(actions);
    modal.appendChild(form);
    overlay.appendChild(modal);
    return overlay;
  }

  // ── Utility ──
  function el(tag, attrs = {}, text = '') {
    const e = document.createElement(tag);
    Object.entries(attrs).forEach(([k,v]) => e.setAttribute(k,v));
    if (text) e.textContent = text;
    return e;
  }

  // ── Init ──
  fetchAppointments();
</script>
</body>
</html>
